name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: |
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest

      - name: Build release APK
        run: |
          ./gradlew :app:assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PWD }}
          keyPassword: ${{ secrets.KEY_PWD }}
        env:
          BUILD_TOOLS_VERSION: "33.0.0"

      - name: Prepare release assets
        run: |
          mv app/build/outputs/apk/release/app-release-unsigned-signed.apk ddys-${{ github.ref_name }}.apk
          sha256sum ddys-${{ github.ref_name }}.apk > ddys-${{ github.ref_name }}.apk.sha256

      - name: Release
        run: |
          gh release create "${{ github.ref_name }}" \
            ddys-${{ github.ref_name }}.apk \
            ddys-${{ github.ref_name }}.apk.sha256 \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

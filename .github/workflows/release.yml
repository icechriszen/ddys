name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Run unit tests
        run: |
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest

      - name: Build release APK
        run: |
          ./gradlew :app:assembleRelease

      - name: Prepare release assets
        run: |
          set -euo pipefail

          build_tools_dir="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          if [ -z "$build_tools_dir" ]; then
            echo "No Android build-tools directory found under $ANDROID_HOME/build-tools" >&2
            exit 1
          fi

          unsigned_apk="app/build/outputs/apk/release/app-release-unsigned.apk"
          aligned_apk="app/build/outputs/apk/release/app-release-aligned.apk"
          signed_apk="ddys-${{ github.ref_name }}.apk"
          keystore="$RUNNER_TEMP/ddys-release.keystore"

          printf '%s' "${{ secrets.SIGNING_KEY }}" | base64 --decode > "$keystore"

          "$build_tools_dir/zipalign" -p -f 4 "$unsigned_apk" "$aligned_apk"
          "$build_tools_dir/apksigner" sign \
            --ks "$keystore" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.KEY_STORE_PWD }}" \
            --key-pass "pass:${{ secrets.KEY_PWD }}" \
            --out "$signed_apk" \
            "$aligned_apk"
          "$build_tools_dir/apksigner" verify --verbose "$signed_apk"

          apk_sha256="$(sha256sum "$signed_apk" | awk '{print $1}')"
          apk_size="$(stat -c%s "$signed_apk")"
          sha256sum "$signed_apk" > "$signed_apk.sha256"

          cat > update.json <<EOF
          {
            "tag_name": "${{ github.ref_name }}",
            "name": "${{ github.ref_name }}",
            "body": "",
            "html_url": "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}",
            "assets": [
              {
                "name": "$signed_apk",
                "browser_download_url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$signed_apk",
                "size": $apk_size,
                "digest": "sha256:$apk_sha256"
              }
            ]
          }
          EOF

      - name: Release
        run: |
          gh release create "${{ github.ref_name }}" \
            ddys-${{ github.ref_name }}.apk \
            ddys-${{ github.ref_name }}.apk.sha256 \
            update.json \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
